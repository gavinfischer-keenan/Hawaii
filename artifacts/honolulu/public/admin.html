<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawaii Telemetry - Admin Upload</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0a0e1a; color: #fff; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { margin-top: 0; color: #4facfe; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #b2bec3; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box; }
        button { background: #0984e3; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #74b9ff; }
        #preview { margin-top: 20px; max-width: 100%; border-radius: 6px; display: none; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .success { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .error { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vessel & Aircraft Image Uploader</h1>
    <p style="color:#b2bec3; margin-bottom:30px;">Upload a photo to be displayed on the telemetry dashboard. The image will be persistently mapped to the Ship's MMSI or Aircraft's ICAO/Callsign.</p>
    
    <div class="form-group">
        <label>Target Type</label>
        <select id="type">
            <option value="ship">Maritime Vessel (Ship)</option>
            <option value="aircraft">Aviation (Aircraft)</option>
        </select>
    </div>

    <div class="form-group">
        <label>ID (MMSI or ICAO24/Callsign)</label>
        <input type="text" id="targetId" placeholder="e.g. 367482320 or N12345">
    </div>

    <div class="form-group">
        <label>Select Photo</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <img id="preview">

    <button id="uploadBtn">Upload to Dashboard</button>

    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    let base64Data = null;

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) {
            preview.style.display = 'none';
            base64Data = null;
            return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
            base64Data = event.target.result;
            preview.src = base64Data;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const type = document.getElementById('type').value;
        const targetId = document.getElementById('targetId').value.trim();
        const status = document.getElementById('status');

        if (!targetId || !base64Data) {
            status.textContent = 'Please provide an ID and select an image.';
            status.className = 'error';
            status.style.display = 'block';
            return;
        }

        document.getElementById('uploadBtn').textContent = 'Uploading...';
        document.getElementById('uploadBtn').disabled = true;

        try {
            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: type,
                    id: targetId,
                    image_base64: base64Data
                })
            });

            const data = await res.json();
            
            status.style.display = 'block';
            if (data.success) {
                status.textContent = `Successfully assigned image to ${type} ${targetId}!`;
                status.className = 'success';
                setTimeout(() => {
                    document.getElementById('targetId').value = '';
                    fileInput.value = '';
                    preview.style.display = 'none';
                    base64Data = null;
                    status.style.display = 'none';
                }, 3000);
            } else {
                status.textContent = data.error || 'Upload failed.';
                status.className = 'error';
            }
        } catch (err) {
            status.textContent = 'Network error. Make sure the backend is running.';
            status.className = 'error';
            status.style.display = 'block';
        }

        document.getElementById('uploadBtn').textContent = 'Upload to Dashboard';
        document.getElementById('uploadBtn').disabled = false;
    });
</script>
</body>
</html>
